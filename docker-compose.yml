services:
  web:
    build:
      context: ./docker                      # Dockerfile dans ./docker
    container_name: ecoride-web
    ports:
      - "8081:80"                            # 🔹 site sur http://localhost:8081
    volumes:
      - .:/var/www/html                      # 🔹 monte tout le projet (frontend + backend)
    depends_on:
      - db
      - mongo
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
      - MONGO_URI=mongodb://mongo:27017
    restart: always

  db:
    image: mysql:8.0
    container_name: ecoride-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecoride
      MYSQL_USER: ecoride_user
      MYSQL_PASSWORD: ecoride_pass
    ports:
      - "3306:3306"                          # 🔹 accès via DBeaver / PHPMyAdmin
    volumes:
      - db_data:/var/lib/mysql               # 🔹 persistance des données
      - ./docker/mysql-init:/docker-entrypoint-initdb.d  # 🔹 scripts SQL auto

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ecoride-phpmyadmin
    restart: always
    ports:
      - "8080:80"                            # 🔹 phpMyAdmin sur http://localhost:8080
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

  mongo:
    image: mongo:7.0
    container_name: ecoride-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  db_data:
  mongo_data: